services:
  db:
    image: postgres:16-alpine
    container_name: studydash-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: studydash
      POSTGRES_USER: studydash
      POSTGRES_PASSWORD: studydash
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    networks:
      - studydash-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studydash -d studydash"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studydash-backend
    ports:
      - "5055:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=studydash;Username=studydash;Password=studydash
    depends_on:
      db:
        condition: service_healthy
    networks:
      - studydash-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5055
    container_name: studydash-frontend
    ports:
      - "3055:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5055
      - INTERNAL_API_URL=http://studydash-backend:8080
    depends_on:
      - backend
    networks:
      - studydash-net

networks:
  studydash-net:
    driver: bridge

